<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 620" width="100%" height="100%">
  <defs>
    <!-- Gradientes e Sombras -->
    <linearGradient id="phone-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a84ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="bot-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0066cc"/>
      <stop offset="100%" stop-color="#0044aa"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <drop-shadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Fundo com Glow Sutil -->
  <rect width="450" height="620" fill="none" />
  
  <!-- Corpo do Celular (Glassmorphic Outer) -->
  <rect x="15" y="15" width="420" height="590" rx="36" fill="#0c0d12" stroke="rgba(255, 255, 255, 0.08)" stroke-width="2" filter="url(#shadow)" />
  
  <!-- Câmera Superior (Dynamic Island/Notch) -->
  <rect x="165" y="28" width="120" height="24" rx="12" fill="#000000" />
  <circle cx="265" cy="40" r="4.5" fill="#111111" />
  <circle cx="265" cy="40" r="1.5" fill="#0a84ff" />

  <!-- Cabeçalho do Chat -->
  <g transform="translate(15, 68)">
    <!-- Linha Divisória Inferior -->
    <line x1="0" y1="52" x2="420" y2="52" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1" />
    
    <!-- Foto de Perfil (Avatar com Carro & IA) -->
    <rect x="25" y="6" width="40" height="40" rx="20" fill="#0066cc" />
    <circle cx="45" cy="26" r="14" fill="none" stroke="#ffffff" stroke-width="1.5" />
    <!-- Pequeno Carro Simbólico -->
    <path d="M37 28 H53 L51 24 H39 Z" fill="#ffffff" />
    <circle cx="41" cy="30" r="2" fill="#ffffff" />
    <circle cx="49" cy="30" r="2" fill="#ffffff" />
    
    <!-- Nome do Bot e Status -->
    <text x="75" y="22" fill="#ffffff" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="15">Davi XCarros</text>
    <circle cx="79" cy="36" r="3.5" fill="#30d158" />
    <text x="89" y="39" fill="rgba(255, 255, 255, 0.5)" font-family="'Inter', sans-serif" font-weight="500" font-size="11">atndia Online (IA)</text>

    <!-- Ícones de Ação Simples -->
    <circle cx="345" cy="26" r="2" fill="rgba(255, 255, 255, 0.7)" />
    <circle cx="345" cy="32" r="2" fill="rgba(255, 255, 255, 0.7)" />
    <circle cx="345" cy="20" r="2" fill="rgba(255, 255, 255, 0.7)" />
  </g>

  <!-- Área das Mensagens (Scrollport) -->
  <g transform="translate(15, 132)">
    
    <!-- Tag de Data -->
    <rect x="180" y="10" width="60" height="20" rx="10" fill="rgba(255, 255, 255, 0.04)" />
    <text x="210" y="24" text-anchor="middle" fill="rgba(255, 255, 255, 0.4)" font-family="'Inter', sans-serif" font-size="10" font-weight="600">HOJE</text>

    <!-- Balão 1: Cliente (Direita) -->
    <g transform="translate(125, 45)">
      <!-- Balão -->
      <rect x="0" y="0" width="270" height="65" rx="16" fill="rgba(255, 255, 255, 0.04)" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" />
      <text x="15" y="24" fill="#ffffff" font-family="'Plus Jakarta Sans', sans-serif" font-size="13" font-weight="400">Olá! Vi o anúncio do Renault Kwid.</text>
      <text x="15" y="44" fill="#ffffff" font-family="'Plus Jakarta Sans', sans-serif" font-size="13" font-weight="400">Ainda está disponível? Qual o valor?</text>
      <!-- Hora e Check -->
      <text x="235" y="58" fill="rgba(255, 255, 255, 0.3)" font-family="'Inter', sans-serif" font-size="9" font-weight="500">11:23</text>
      <path d="M252 53 L256 57 L263 51 M255 53 L259 57 L266 51" stroke="#0a84ff" stroke-width="1.2" fill="none" />
    </g>

    <!-- Balão 2: atndia Bot (Esquerda) -->
    <g transform="translate(25, 125)">
      <!-- Balão -->
      <rect x="0" y="0" width="295" height="185" rx="16" fill="url(#bot-gradient)" stroke="rgba(10, 132, 255, 0.2)" stroke-width="1" />
      <!-- Conteúdo da IA -->
      <text x="15" y="24" fill="#ffffff" font-family="'Plus Jakarta Sans', sans-serif" font-size="13" font-weight="700">Olá! Sou o Davi, assistente da XCarros 🚘</text>
      <text x="15" y="45" fill="#ffffff" font-family="'Plus Jakarta Sans', sans-serif" font-size="13" font-weight="400">Sim! O Renault Kwid Zen (2024) azul</text>
      <text x="15" y="62" fill="#ffffff" font-family="'Plus Jakarta Sans', sans-serif" font-size="13" font-weight="400">está disponível em nosso estoque!</text>
      
      <!-- Detalhes do Estoque -->
      <rect x="15" y="78" width="265" height="65" rx="8" fill="rgba(0, 0, 0, 0.2)" />
      <text x="25" y="96" fill="#d4af37" font-family="'Space Grotesk', sans-serif" font-size="13" font-weight="700">Valor: R$ 57.900</text>
      <text x="25" y="115" fill="rgba(255, 255, 255, 0.8)" font-family="'Plus Jakarta Sans', sans-serif" font-size="12" font-weight="500">KM: 67.000 | Câmbio: Manual</text>
      <text x="25" y="132" fill="rgba(255, 255, 255, 0.8)" font-family="'Plus Jakarta Sans', sans-serif" font-size="12" font-weight="500">Opcionais: Direção elétrica, Ar, ABS</text>

      <text x="15" y="162" fill="#ffffff" font-family="'Plus Jakarta Sans', sans-serif" font-size="13" font-weight="400">Gostaria de agendar um test-drive hoje?</text>
      
      <!-- Hora -->
      <text x="260" y="178" fill="rgba(255, 255, 255, 0.5)" font-family="'Inter', sans-serif" font-size="9" font-weight="500">11:23</text>
    </g>

    <!-- Balão 3: Cliente (Direita) -->
    <g transform="translate(125, 325)">
      <!-- Balão -->
      <rect x="0" y="0" width="270" height="48" rx="16" fill="rgba(255, 255, 255, 0.04)" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" />
      <text x="15" y="22" fill="#ffffff" font-family="'Plus Jakarta Sans', sans-serif" font-size="13" font-weight="400">Quero sim! Pode ser hoje às 15h?</text>
      <!-- Hora e Check -->
      <text x="235" y="40" fill="rgba(255, 255, 255, 0.3)" font-family="'Inter', sans-serif" font-size="9" font-weight="500">11:24</text>
      <path d="M252 35 L256 39 L263 33 M255 35 L259 39 L266 33" stroke="#0a84ff" stroke-width="1.2" fill="none" />
    </g>

    <!-- Balão 4: atndia Bot (Esquerda) -->
    <g transform="translate(25, 388)">
      <!-- Balão -->
      <rect x="0" y="0" width="295" height="68" rx="16" fill="url(#bot-gradient)" stroke="rgba(10, 132, 255, 0.2)" stroke-width="1" />
      <text x="15" y="24" fill="#ffffff" font-family="'Plus Jakarta Sans', sans-serif" font-size="13" font-weight="700">Perfeito! Agendado para hoje às 15:00. ✅</text>
      <text x="15" y="44" fill="#ffffff" font-family="'Plus Jakarta Sans', sans-serif" font-size="13" font-weight="400">O consultor Felipe estará te esperando!</text>
      <!-- Hora -->
      <text x="260" y="60" fill="rgba(255, 255, 255, 0.5)" font-family="'Inter', sans-serif" font-size="9" font-weight="500">11:24</text>
    </g>
  </g>

  <!-- Área de Input do Usuário (Rodapé do Chat) -->
  <g transform="translate(15, 545)">
    <line x1="0" y1="0" x2="420" y2="0" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1" />
    
    <!-- Caixa de Texto -->
    <rect x="25" y="10" width="310" height="36" rx="18" fill="rgba(255, 255, 255, 0.04)" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1" />
    <text x="45" y="32" fill="rgba(255, 255, 255, 0.25)" font-family="'Plus Jakarta Sans', sans-serif" font-size="13">Digite uma mensagem...</text>
    
    <!-- Ícone de Microfone/Enviar -->
    <circle cx="370" cy="28" r="18" fill="#0066cc" />
    <!-- Símbolo de Enviar (Seta) -->
    <path d="M365 24 L377 28 L365 32 L368 28 Z" fill="#ffffff" />
  </g>
</svg>
